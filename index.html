<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Currency Converter - Shravan</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #0088cc; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 14px; color: #555; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #006699; }
        .result-box { margin-top: 20px; padding: 15px; background: #e7f3ff; border-radius: 8px; border: 1px dashed #0088cc; }
        #resultText { font-size: 20px; font-weight: bold; color: #333; margin: 0; }
        .footer { margin-top: 15px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>Global Converter</h2>
    
    <div class="input-group">
        <label>Amount:</label>
        <input type="number" id="amount" value="1" placeholder="Enter amount">
    </div>

    <div class="input-group">
        <label>From:</label>
        <select id="fromCurrency">
            <option value="USD">USD - US Dollar</option>
            <option value="INR" selected>INR - Indian Rupee</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="AED">AED - UAE Dirham</option>
            <option value="JPY">JPY - Japanese Yen</option>
        </select>
    </div>

    <div class="input-group">
        <label>To:</label>
        <select id="toCurrency">
            <option value="USD" selected>USD - US Dollar</option>
            <option value="INR">INR - Indian Rupee</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="AED">AED - UAE Dirham</option>
            <option value="JPY">JPY - Japanese Yen</option>
        </select>
    </div>

    <button onclick="convertCurrency()">Convert Now</button>

    <div class="result-box">
        <p id="resultText">Press Convert to see results</p>
    </div>

    <div class="footer">
        Built with Logic by Shravan 🇮🇳
    </div>
</div>

<script>
    // Free API for Real-time rates
    const apiURL = "https://open.er-api.com/v6/latest/";

    async function convertCurrency() {
        const amount = document.getElementById('amount').value;
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const resultText = document.getElementById('resultText');

        if (amount === "" || amount <= 0) {
            resultText.innerText = "Please enter a valid amount";
            return;
        }

        resultText.innerText = "Fetching rates...";

        try {
            // Fetch real-time data from API
            const response = await fetch(`${apiURL}${from}`);
            const data = await response.json();
            
            if (data.result === "success") {
                const rate = data.rates[to];
                const total = (amount * rate).toFixed(2);
                resultText.innerText = `${amount} ${from} = ${total} ${to}`;
            } else {
                resultText.innerText = "Error fetching rates.";
            }
        } catch (error) {
            console.error(error);
            resultText.innerText = "Network Error!";
        }
    }
</script>

</body>
</html>
